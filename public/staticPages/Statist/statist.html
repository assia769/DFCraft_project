<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Statistics</title>
    <link rel="icon" href="../icons/statistic.png" />
    <link rel="stylesheet" href="./Style.css" />
  </head>
  <body>
    <header>
      <img src="../../icons/LOGO.png" alt="Statistics Icon" class="Logo" />
    </header>
    <main class="Cards">
      <div class="Card_info">
        <p class="title">Today's focus</p>
        <p class="data">Xh Ym</p>
      </div>
      <div class="Card_info">
        <p class="title">Tasks Smashed</p>
        <p class="data">X</p>
      </div>
      <div class="Card_info">
        <p class="title">Quiet Time</p>
        <p class="data">Xmin</p>
      </div>
      <div class="Card_info">
        <p class="title">Blocks Deflected</p>
        <p class="data">X</p>
      </div>
    </main>
    <div id="chart-container"></div>
    <script src="https://echarts.apache.org/en/js/vendors/echarts/dist/echarts.min.js"></script>
    <script src="./Script.js"></script>
  </body>
</html>
